      x1="20" 
      y1="2" 
      x2="20" 
      y2="16" 
      stroke="#00BFA6" 
      stroke-width="5" 
      stroke-linecap="round"
    />
  </g>

  <!-- CUS -->
  <text x="68" y="42" font-family="Inter, sans-serif" font-size="42" font-weight="600" fill="#2F3A46">
    CUS
  </text>

  <!-- 15 -->
  <text x="160" y="42" font-family="Inter, sans-serif" font-size="42" font-weight="600" fill="#2F3A46">
    15
