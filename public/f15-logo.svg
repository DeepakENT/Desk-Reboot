<svg width="260" height="60" viewBox="0 0 260 60" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- F -->
  <text x="0" y="42" font-family="Inter, sans-serif" font-size="42" font-weight="600" fill="#2F3A46">
    F
  </text>

  <!-- PERFECT POWER ICON -->
  <g transform="translate(28,8)">
    <!-- Circle -->
    <circle 
      cx="20" 
      cy="20" 
      r="16" 
      stroke="#00BFA6" 
      stroke-width="5"
      fill="none"
    />

    <!-- Power line (centered + balanced) -->
